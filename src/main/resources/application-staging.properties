# Staging mirrors production semantics and no longer mutates the schema implicitly.
spring.datasource.url=jdbc:sqlite:${APP_DB_PATH:./databases/student_tasks.db}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

server.port=${PORT:${APP_PORT:5000}}
server.address=0.0.0.0
server.servlet.context-path=/

spring.security.oauth2.client.registration.iserv.redirect-uri=${ISERV_REDIRECT_URI:https://${REPLIT_DEV_DOMAIN}/login/oauth2/code/iserv}

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true

logging.level.root=INFO
logging.level.com.example.studenttask=INFO
logging.level.org.springframework.security=WARN
