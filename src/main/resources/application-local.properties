# Local development keeps schema updates enabled until versioned migrations exist.
spring.datasource.url=jdbc:sqlite:${APP_DB_PATH:./databases/student_tasks.db}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=${APP_PORT:8080}
server.address=${APP_ADDRESS:127.0.0.1}
server.servlet.context-path=${APP_CONTEXT_PATH:/}

spring.security.oauth2.client.registration.iserv.redirect-uri=${ISERV_REDIRECT_URI:http://localhost:8080/login/oauth2/code/iserv}

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false

logging.level.root=INFO
logging.level.com.example.studenttask=DEBUG
logging.level.org.springframework.security=INFO
