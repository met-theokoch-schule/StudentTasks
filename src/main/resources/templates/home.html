
<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schüler-Aufgaben-Verwaltung</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <h1 class="display-4">Willkommen zum Aufgaben-System</h1>
                <p class="lead">Verwalten Sie Aufgaben für Schülergruppen mit OpenID Connect Authentifizierung</p>
                
                <div class="alert alert-warning mt-4 text-start" th:unless="${oauthConfigurationReady}">
                    Die IServ-Anmeldung ist noch nicht konfiguriert.
                    <a th:href="${oauthLoginPath}">Kurze Setup-Anleitung anzeigen</a>
                </div>

                <div class="mt-4">
                    <a class="btn btn-primary btn-lg" th:href="${oauthLoginPath}">
                        <span th:text="${oauthConfigurationReady} ? 'Mit IServ anmelden' : 'IServ-Konfiguration anzeigen'">Mit IServ anmelden</span>
                    </a>
                </div>
                <div class="mt-4" th:if="${oauthConfigurationReady}">
                    <a class="btn btn-primary btn-lg" th:href="@{/teacher/dashboard}">
                        Direkt zum Dashboard
                    </a>
                </div>
                
                
            </div>
        </div>
    </div>
</body>
</html>
