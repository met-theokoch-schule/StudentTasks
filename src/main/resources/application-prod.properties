# Production uses an existing schema until Flyway/Liquibase migrations are introduced.
spring.datasource.url=jdbc:sqlite:${APP_DB_PATH:/databases/student_tasks.db}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

server.port=${PORT:${APP_PORT:8080}}
server.servlet.context-path=${APP_CONTEXT_PATH:/informatik}

spring.security.oauth2.client.registration.iserv.redirect-uri=${ISERV_REDIRECT_URI:https://services-new.theokoch.schule/informatik/login/oauth2/code/iserv}

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10

server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=true

logging.level.root=WARN
logging.level.com.example.studenttask=INFO
logging.level.org.springframework.security=WARN
