spring.application.name=student-task-management
# Activate one of the environment profiles: local, staging or prod.

# Shared datasource settings. Environment-specific URLs live in profile files.
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.sql.init.mode=never

# OAuth credentials must be supplied by the runtime environment.
spring.security.oauth2.client.registration.iserv.client-id=${ISERV_CLIENT_ID}
spring.security.oauth2.client.registration.iserv.client-secret=${ISERV_CLIENT_SECRET}
spring.security.oauth2.client.registration.iserv.scope=openid,profile,email,groups,roles
spring.security.oauth2.client.registration.iserv.authorization-grant-type=authorization_code

app.oauth.iserv.base-url=${ISERV_BASE_URL:https://theokoch.schule}
spring.security.oauth2.client.provider.iserv.authorization-uri=${app.oauth.iserv.base-url}/iserv/oauth/v2/auth
spring.security.oauth2.client.provider.iserv.token-uri=${app.oauth.iserv.base-url}/iserv/oauth/v2/token
spring.security.oauth2.client.provider.iserv.user-info-uri=${app.oauth.iserv.base-url}/iserv/public/oauth/userinfo
spring.security.oauth2.client.provider.iserv.jwk-set-uri=${app.oauth.iserv.base-url}/iserv/public/jwk
spring.security.oauth2.client.provider.iserv.user-name-attribute=sub

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

server.servlet.session.cookie.http-only=true
server.servlet.session.timeout=90m

spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Berlin
spring.jackson.time-zone=Europe/Berlin
